<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SafeZone - אפליקציית צוות</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>

    <style>
        :root { --primary: #e67e22; --dark: #1a1a1a; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--dark); color: white; text-align: center; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { width: 90%; max-width: 400px; background: #2c3e50; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; font-size: 1rem; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; font-size: 1.1rem; border-radius: 50px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        #status { margin-top: 20px; font-weight: bold; }
        #loc-info { color: var(--primary); font-size: 0.9rem; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🛡️ SafeZone</h1>
        <p>מערכת הגנה לצוותי חירום</p>
        
        <input type="text" id="userName" placeholder="שם מלא">
        <select id="userCity">
            <option value="">בחר עיר מגורים/עבודה</option>
            <option value="יהוד-מונוסון">יהוד-מונוסון</option>
            <option value="חולון">חולון</option>
            <option value="תל אביב - יפו">תל אביב - יפו</option>
            <option value="אור יהודה">אור יהודה</option>
        </select>

        <button class="btn" id="activateBtn" onclick="activateSystem()">הפעל הגנה ודיווח מיקום</button>
        
        <div id="status">המערכת לא פעילה</div>
        <div id="loc-info"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDLKF30weC2z70WvK3zvDoOqIVWYfoQ9ow",
            authDomain: "safezone-cd4b5.firebaseapp.com",
            projectId: "safezone-cd4b5",
            storageBucket: "safezone-cd4b5.appspot.com",
            messagingSenderId: "78949340231",
            appId: "1:78949340231:web:85929f70752f1fc7cf8d62"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const messaging = firebase.messaging();

        async function activateSystem() {
            const name = document.getElementById('userName').value;
            const selectedCity = document.getElementById('userCity').value;

            if(!name || !selectedCity) return alert("נא למלא שם ולבחור עיר");

            try {
                // 1. קבלת מיקום GPS מדויק
                const pos = await new Promise((res, rej) => {
                    navigator.geolocation.getCurrentPosition(res, rej, { timeout: 10000 });
                });
                const { latitude, longitude } = pos.coords;

                // 2. הרשאה להתראות
                const permission = await Notification.requestPermission();
                if (permission !== 'granted') throw "יש לאשר התראות כדי לקבל צבע אדום";

                const sw = await navigator.serviceWorker.register('firebase-messaging-sw.js');
                const token = await messaging.getToken({ 
                    serviceWorkerRegistration: sw,
                    vapidKey: "BIXCZU-c8gIaA5JScoc7-wDLWKZErE9YM1-NKt0ot0UZq6c6iGKWQgxBHaFzquGlyjL6pMwpV-vH0NOq6XmxZGo"
                });

                // 3. שמירה ל-Database
                await db.collection('tokens').doc(token).set({
                    name: name,
                    city: selectedCity,
                    lat: latitude,
                    lng: longitude,
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                });

                document.getElementById('status').innerText = "✅ הגנה פעילה";
                document.getElementById('status').style.color = "#2ecc71";
                document.getElementById('loc-info').innerText = `מיקום GPS נקלט בהצלחה`;
                alert("נרשמת בהצלחה! המיקום שלך מעודכן במפה.");

            } catch (e) {
                alert("שגיאה: " + e);
            }
        }
    </script>
</body>
</html>
