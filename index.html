<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SafeZone - מערכת ניהול</title>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #333;
        }
        .container {
            width: 90%;
            max-width: 400px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { color: #1a73e8; }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
        }
        .success { background-color: #e6f4ea; color: #1e8e3e; }
        .error { background-color: #fce8e6; color: #d93025; }
    </style>
</head>
<body>

    <div class="container">
        <h1>SafeZone</h1>
        <p>מערכת ה-Firebase מאותחלת כעת...</p>
        <div id="connection-status" class="status">מתחבר לשרת...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-analytics-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
        // הגדרות ה-Firebase המעודכנות שלך
        const firebaseConfig = {
            apiKey: "AIzaSyDLKF30weC2z70WvK3zvDoOqIVWYfoQ9ow",
            authDomain: "safezone-cd4b5.firebaseapp.com",
            projectId: "safezone-cd4b5",
            storageBucket: "safezone-cd4b5.firebasestorage.app",
            messagingSenderId: "78949340231",
            appId: "1:78949340231:web:85929f70752f1fc7cf8d62",
            measurementId: "G-DYT4ZHEN92"
        };

        // אתחול Firebase
        try {
            firebase.initializeApp(firebaseConfig);
            if ("measurementId" in firebaseConfig) {
                firebase.analytics();
            }
            
            document.getElementById('connection-status').innerText = "✅ Firebase מחובר בהצלחה!";
            document.getElementById('connection-status').classList.add('success');
            console.log("Firebase initialized successfully for SafeZone");
            
        } catch (error) {
            document.getElementById('connection-status').innerText = "❌ שגיאה בחיבור: " + error.message;
            document.getElementById('connection-status').classList.add('error');
            console.error("Firebase initialization error:", error);
        }
    </script>
</body>
</html>
