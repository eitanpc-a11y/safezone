<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SafeZone - דיווח מהשטח</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --red: #d32f2f; --green: #388e3c; }
        body { font-family: system-ui, sans-serif; background: #f0f2f5; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; font-size: 1rem; }
        .btn { width: 100%; padding: 20px; margin: 5px 0; border: none; border-radius: 12px; font-weight: bold; font-size: 1.2rem; color: white; cursor: pointer; }
        .red { background: var(--red); } .green { background: var(--green); }
        #status { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: var(--red)">SafeZone 🆘</h2>
        <input type="text" id="name" placeholder="שם מלא">
        <input type="tel" id="phone" placeholder="טלפון">
        <button class="btn red" onclick="sendReport('זקוק לעזרה')">🆘 זקוק לעזרה</button>
        <button class="btn green" onclick="sendReport('בטוח במקלט')">✅ אני בטוח</button>
        <div id="status"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDLKF30weC2z70WvK3zvDoOqIVWYfoQ9ow",
            authDomain: "safezone-cd4b5.firebaseapp.com",
            projectId: "safezone-cd4b5",
            appId: "1:78949340231:web:85929f70752f1fc7cf8d62"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // שמירה וטעינה של פרטים
        window.onload = () => {
            document.getElementById('name').value = localStorage.getItem('sz_name') || "";
            document.getElementById('phone').value = localStorage.getItem('sz_phone') || "";
        };

        async function sendReport(status) {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            if (!name) return alert("הכנס שם");
            
            localStorage.setItem('sz_name', name);
            localStorage.setItem('sz_phone', phone);
            
            const msg = document.getElementById('status');
            msg.innerText = "מאתר מיקום (עוקף שיבושים)... 📡";

            // הגדרות למלחמה בשיבושי GPS בישראל
            const geoOptions = {
                enableHighAccuracy: false, // קריטי! עוזר למנוע קפיצה לדבלין
                timeout: 10000,
                maximumAge: 0
            };

            navigator.geolocation.getCurrentPosition(async (pos) => {
                await db.collection("reports").add({
                    name, phone, status,
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    time: firebase.firestore.FieldValue.serverTimestamp()
                });
                msg.innerText = "✅ הדיווח נשלח בהצלחה!";
                msg.style.color = "green";
            }, (err) => {
                msg.innerText = "❌ שגיאת מיקום: " + err.message;
            }, geoOptions);
        }
    </script>
</body>
</html>
