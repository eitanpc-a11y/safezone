<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SafeZone - אפליקציית צוות</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e67e22">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --primary: #e67e22;
            --primary-dark: #d35400;
            --dark: #1a1a1a;
            --card-bg: #2c3e50;
            --success: #2ecc71;
            --warning: #f39c12;
            --error: #e74c3c;
            --text-muted: #95a5a6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--dark);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            padding: 28px 24px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .logo { font-size: 2.5rem; text-align: center; margin-bottom: 6px; }
        h1 { font-size: 1.7rem; text-align: center; margin-bottom: 3px; }
        .subtitle { color: var(--text-muted); font-size: 0.88rem; text-align: center; margin-bottom: 22px; }

        .form-group { margin-bottom: 11px; text-align: right; }
        label { display: block; font-size: 0.83rem; color: var(--text-muted); margin-bottom: 4px; }

        input, select {
            width: 100%; padding: 12px 14px;
            border-radius: 10px; border: 2px solid transparent;
            font-size: 1rem; background: #1a252f; color: white;
            transition: border-color 0.2s; font-family: inherit;
        }
        input:focus, select:focus { outline: none; border-color: var(--primary); }
        select option { background: #1a252f; }

        .btn {
            color: white; border: none; padding: 14px;
            font-size: 1rem; border-radius: 50px; cursor: pointer;
            width: 100%; font-weight: bold; margin-top: 10px;
            transition: background 0.2s, transform 0.1s; font-family: inherit;
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-activate { background: var(--primary); }
        .btn-activate:hover { background: var(--primary-dark); }
        .btn-deactivate { background: #444; font-size: 0.85rem; padding: 10px; }
        .btn-deactivate:hover { background: #333; }

        #status { margin-top: 16px; font-weight: bold; font-size: 0.95rem; text-align: center; min-height: 24px; }
        #loc-info { color: var(--text-muted); font-size: 0.82rem; margin-top: 5px; text-align: center; min-height: 18px; }
        .status-active { color: var(--success); }
        .status-error { color: var(--error); }
        .status-loading { color: var(--primary); }

        .permission-hint {
            background: rgba(231, 76, 60, 0.12);
            border: 1px solid rgba(231, 76, 60, 0.3);
            border-radius: 10px; padding: 11px;
            margin-top: 10px; font-size: 0.83rem; color: #e74c3c;
            display: none; text-align: right;
        }
        .permission-hint.show { display: block; }

        /* ===== פאנל סטטוס ===== */
        #status-panel {
            display: none;
            margin-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 18px;
        }

        .status-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 12px;
        }

        .status-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }

        .status-btn {
            border: 2px solid transparent; border-radius: 14px; padding: 14px 6px;
            font-size: 0.82rem; font-weight: bold; cursor: pointer;
            font-family: inherit; transition: all 0.15s;
            display: flex; flex-direction: column;
            align-items: center; gap: 6px; color: white;
        }
        .status-btn:hover { transform: scale(1.04); filter: brightness(1.15); }
        .status-btn:active { transform: scale(0.97); }

        .status-btn .icon { font-size: 1.5rem; }

        .status-btn.safe   { background: #1e7e4a; border-color: #1e7e4a; }
        .status-btn.onway  { background: #8a5e00; border-color: #8a5e00; }
        .status-btn.help   { background: #8b1a1a; border-color: #8b1a1a; }

        .status-btn.active.safe  { background: var(--success); border-color: white; box-shadow: 0 0 0 3px rgba(46,204,113,0.4); }
        .status-btn.active.onway { background: var(--warning); border-color: white; box-shadow: 0 0 0 3px rgba(243,156,18,0.4); }
        .status-btn.active.help  { background: var(--error);   border-color: white; box-shadow: 0 0 0 3px rgba(231,76,60,0.4); animation: pulse-border 1.5s infinite; }

        .current-status-bar {
            margin-top: 12px;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.85rem;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        .current-status-bar.safe  { background: rgba(46,204,113,0.15); color: var(--success); border: 1px solid rgba(46,204,113,0.3); }
        .current-status-bar.onway { background: rgba(243,156,18,0.15); color: var(--warning); border: 1px solid rgba(243,156,18,0.3); }
        .current-status-bar.help  { background: rgba(231,76,60,0.15); color: var(--error); border: 1px solid rgba(231,76,60,0.3); animation: pulse-border 1.5s infinite; }

        @keyframes pulse-border {
            0%, 100% { border-color: rgba(231,76,60,0.3); }
            50% { border-color: rgba(231,76,60,0.9); }
        }

        .spinner {
            display: inline-block; width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%;
            animation: spin 0.7s linear infinite; vertical-align: middle; margin-left: 5px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        footer { margin-top: 20px; color: var(--text-muted); font-size: 0.73rem; text-align: center; }

        /* ===== מפה לבחירת מיקום ידנית ===== */
        #map-modal {
            display: none;
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(0,0,0,0.85);
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 16px;
        }
        #map-modal.open { display: flex; }

        .map-modal-box {
            background: #1e1e1e;
            border-radius: 18px;
            width: 100%;
            max-width: 480px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }

        .map-modal-header {
            padding: 16px 18px 12px;
            background: #2c3e50;
        }
        .map-modal-header h3 { font-size: 1rem; margin: 0 0 4px; }
        .map-modal-header p  { font-size: 0.8rem; color: #95a5a6; margin: 0; }

        #location-pick-map {
            width: 100%;
            height: 320px;
        }

        .map-modal-footer {
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            background: #1a1a1a;
        }

        .btn-pick-confirm {
            flex: 1; background: var(--primary); color: white;
            border: none; padding: 12px; border-radius: 10px;
            font-size: 0.92rem; font-weight: bold; cursor: pointer;
            font-family: inherit;
        }
        .btn-pick-confirm:disabled { background: #555; cursor: not-allowed; }
        .btn-pick-cancel {
            background: #333; color: #aaa;
            border: none; padding: 12px 16px; border-radius: 10px;
            font-size: 0.88rem; cursor: pointer; font-family: inherit;
        }
        .pick-hint {
            font-size: 0.78rem; color: #e67e22; text-align: center;
            padding: 8px 16px 0; background: #1a1a1a;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🛡️</div>
        <h1>SafeZone</h1>
        <p class="subtitle">מערכת הגנה לצוותי חירום</p>

        <div id="register-panel">
            <div class="form-group">
                <label for="userName">שם מלא</label>
                <input type="text" id="userName" placeholder="הכנס את שמך" autocomplete="name">
            </div>
            <div class="form-group">
                <label for="userCity">עיר מגורים / עבודה</label>
                <select id="userCity">
                    <option value="">בחר עיר</option>
                    <option value="יהוד-מונוסון">יהוד-מונוסון</option>
                    <option value="חולון">חולון</option>
                    <option value="תל אביב - יפו">תל אביב - יפו</option>
                    <option value="אור יהודה">אור יהודה</option>
                    <option value="ראשון לציון">ראשון לציון</option>
                    <option value="פתח תקווה">פתח תקווה</option>
                    <option value="בת ים">בת ים</option>
                    <option value="רמת גן">רמת גן</option>
                    <option value="גבעתיים">גבעתיים</option>
                    <option value="בני ברק">בני ברק</option>
                </select>
            </div>
            <button class="btn btn-activate" id="activateBtn" onclick="activateSystem()">
                הפעל הגנה ודיווח מיקום
            </button>
        </div>

        <div id="status">המערכת לא פעילה</div>
        <div id="loc-info"></div>

        <div class="permission-hint" id="permHint">
            ⚠️ יש לאפשר הרשאות מיקום והתראות בהגדרות הדפדפן.
        </div>

        <!-- פאנל דיווח סטטוס — מוצג אחרי הרשמה -->
        <div id="status-panel">
            <p class="status-label" id="statusPanelLabel">דווח את מצבך כעת:</p>
            <div class="status-buttons">
                <button class="status-btn safe" onclick="reportStatus('safe')">
                    <span class="icon">✅</span>
                    אני בטוח
                </button>
                <button class="status-btn onway" onclick="reportStatus('onway')">
                    <span class="icon">🚗</span>
                    אני בדרך
                </button>
                <button class="status-btn help" onclick="reportStatus('help')">
                    <span class="icon">🆘</span>
                    זקוק לעזרה
                </button>
            </div>
            <div class="current-status-bar" id="currentStatusBar"></div>
        </div>

        <button class="btn btn-deactivate" id="deactivateBtn" onclick="deactivateSystem()" style="display:none; margin-top:14px;">
            בטל רישום מהמערכת
        </button>

        <footer>SafeZone v2.0 &bull; מערכת צוות חירום</footer>
    </div>

    <!-- מודל בחירת מיקום ידנית -->
    <div id="map-modal">
        <div class="map-modal-box">
            <div class="map-modal-header">
                <h3>📍 סמן את המיקום שלך במפה</h3>
                <p>GPS לא זמין — לחץ על המפה לסימון מיקומך</p>
            </div>
            <div class="pick-hint">לחץ על המפה כדי למקם את הסמן</div>
            <div id="location-pick-map"></div>
            <div class="map-modal-footer">
                <button class="btn-pick-confirm" id="confirmPickBtn" onclick="confirmPickedLocation()" disabled>
                    📍 אשר מיקום
                </button>
                <button class="btn-pick-cancel" onclick="cancelMapPick()">ביטול</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDLKF30weC2z70WvK3zvDoOqIVWYfoQ9ow",
            authDomain: "safezone-cd4b5.firebaseapp.com",
            projectId: "safezone-cd4b5",
            storageBucket: "safezone-cd4b5.appspot.com",
            messagingSenderId: "78949340231",
            appId: "1:78949340231:web:85929f70752f1fc7cf8d62"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const messaging = firebase.messaging();

        let currentToken = localStorage.getItem('safezone_token');

        // בדיקת URL params — מהכפתורים בנוטיפיקציה
        const urlParams = new URLSearchParams(window.location.search);
        const autoStatus = urlParams.get('status');

        if (currentToken) {
            showActiveState();
            if (autoStatus) {
                setTimeout(() => reportStatus(autoStatus), 800);
            }
        }

        function setStatus(text, cls) {
            const el = document.getElementById('status');
            el.textContent = text;
            el.className = cls || '';
        }

        function showActiveState() {
            const name = localStorage.getItem('safezone_name') || '';
            const city = localStorage.getItem('safezone_city') || '';
            setStatus('✅ הגנה פעילה', 'status-active');
            document.getElementById('loc-info').textContent = `${name} — ${city}`;
            document.getElementById('register-panel').style.display = 'none';
            document.getElementById('status-panel').style.display = 'block';
            document.getElementById('deactivateBtn').style.display = 'block';

            // שחזר סטטוס קיים
            const savedStatus = localStorage.getItem('safezone_status');
            if (savedStatus) highlightStatusBtn(savedStatus);
        }

        // ===== בחירת מיקום ידנית =====
        let pickMap = null, pickMarker = null, pickedLatLng = null;
        let pickResolve = null, pickReject = null;

        function getLocationWithFallback() {
            return new Promise((resolve, reject) => {
                setStatus('מאתר מיקום GPS...', 'status-loading');
                navigator.geolocation.getCurrentPosition(
                    (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                    () => {
                        // GPS נכשל — פתח מפה לבחירה ידנית
                        setStatus('GPS לא זמין — בחר מיקום ידנית', 'status-loading');
                        openMapPicker(resolve, reject);
                    },
                    { timeout: 10000, enableHighAccuracy: true }
                );
            });
        }

        function openMapPicker(resolve, reject) {
            pickResolve = resolve;
            pickReject  = reject;
            pickedLatLng = null;

            document.getElementById('map-modal').classList.add('open');
            document.getElementById('confirmPickBtn').disabled = true;

            // אתחל מפה פעם אחת
            if (!pickMap) {
                pickMap = L.map('location-pick-map').setView([31.77, 34.9], 8);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(pickMap);

                pickMap.on('click', function(e) {
                    pickedLatLng = e.latlng;
                    if (pickMarker) {
                        pickMarker.setLatLng(e.latlng);
                    } else {
                        pickMarker = L.marker(e.latlng, { draggable: true }).addTo(pickMap);
                        pickMarker.on('dragend', function() {
                            pickedLatLng = pickMarker.getLatLng();
                        });
                    }
                    document.getElementById('confirmPickBtn').disabled = false;
                    document.getElementById('confirmPickBtn').textContent =
                        `📍 אשר: ${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`;
                });
            } else {
                // רענן מפה (גודל יכול להיות שגוי לאחר display:none)
                setTimeout(() => pickMap.invalidateSize(), 100);
                if (pickMarker) { pickMap.removeLayer(pickMarker); pickMarker = null; }
            }
        }

        function confirmPickedLocation() {
            if (!pickedLatLng) return;
            document.getElementById('map-modal').classList.remove('open');
            if (pickResolve) pickResolve({ lat: pickedLatLng.lat, lng: pickedLatLng.lng });
        }

        function cancelMapPick() {
            document.getElementById('map-modal').classList.remove('open');
            if (pickReject) pickReject(new Error('ביטול'));
        }
        // ===========================

        async function activateSystem() {
            const name = document.getElementById('userName').value.trim();
            const city = document.getElementById('userCity').value;
            if (!name) { alert("נא להכניס שם מלא"); return; }
            if (!city) { alert("נא לבחור עיר"); return; }

            const btn = document.getElementById('activateBtn');
            btn.disabled = true;
            btn.innerHTML = 'מתחבר... <span class="spinner"></span>';
            document.getElementById('permHint').classList.remove('show');

            try {
                // שלב 1: מיקום — GPS או ידני
                const loc = await getLocationWithFallback();

                // שלב 2: הרשאות התראות
                setStatus('מבקש הרשאות התראות...', 'status-loading');
                const permission = await Notification.requestPermission();
                if (permission !== 'granted') {
                    document.getElementById('permHint').classList.add('show');
                    throw new Error("יש לאשר התראות כדי לקבל התראות צבע אדום");
                }

                // שלב 3: רישום FCM
                setStatus('רושם למערכת...', 'status-loading');
                const swReg = await navigator.serviceWorker.register('firebase-messaging-sw.js');
                const token = await messaging.getToken({
                    serviceWorkerRegistration: swReg,
                    vapidKey: "BIXCZU-c8gIaA5JScoc7-wDLWKZErE9YM1-NKt0ot0UZq6c6iGKWQgxBHaFzquGlyjL6pMwpV-vH0NOq6XmxZGo"
                });
                if (!token) throw new Error("לא ניתן לקבל token — נסה שוב");

                // שלב 4: שמירה ב-Firestore
                await db.collection('tokens').doc(token).set({
                    name, city,
                    lat: loc.lat,
                    lng: loc.lng,
                    token,
                    status: null,
                    statusTime: null,
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                });

                currentToken = token;
                localStorage.setItem('safezone_token', token);
                localStorage.setItem('safezone_name', name);
                localStorage.setItem('safezone_city', city);
                showActiveState();

            } catch (err) {
                if (err.message === 'ביטול') {
                    setStatus('הרישום בוטל', '');
                } else {
                    setStatus('❌ שגיאה', 'status-error');
                    alert("שגיאה: " + (err.message || err));
                }
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'הפעל הגנה ודיווח מיקום';
            }
        }

        async function reportStatus(status) {
            if (!currentToken) return;

            const labels = { safe: '✅ אני בטוח', onway: '🚗 אני בדרך', help: '🆘 זקוק לעזרה' };

            try {
                await db.collection('tokens').doc(currentToken).update({
                    status: status,
                    statusTime: firebase.firestore.FieldValue.serverTimestamp()
                });
                localStorage.setItem('safezone_status', status);
                highlightStatusBtn(status);
            } catch(e) {
                alert("שגיאה בעדכון סטטוס: " + e.message);
            }
        }

        function highlightStatusBtn(status) {
            const labels = { safe: '✅ אני בטוח', onway: '🚗 אני בדרך', help: '🆘 זקוק לעזרה' };
            document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
            const btn = document.querySelector(`.status-btn.${status}`);
            if (btn) btn.classList.add('active');

            // עדכן כותרת לאפשרות שינוי
            const lbl = document.getElementById('statusPanelLabel');
            if (lbl) lbl.textContent = 'סטטוס עודכן — לחץ שוב כדי לשנות:';

            const bar = document.getElementById('currentStatusBar');
            bar.textContent = `הסטטוס הנוכחי: ${labels[status]}`;
            bar.className = `current-status-bar ${status}`;
            bar.style.display = 'block';
        }

        async function deactivateSystem() {
            if (!confirm("לבטל את הרישום מ-SafeZone?")) return;
            const btn = document.getElementById('deactivateBtn');
            btn.disabled = true;
            btn.textContent = 'מבטל...';

            try {
                if (currentToken) await db.collection('tokens').doc(currentToken).delete();
            } catch(e) {}

            ['safezone_token','safezone_name','safezone_city','safezone_status'].forEach(k => localStorage.removeItem(k));
            currentToken = null;

            try {
                const regs = await navigator.serviceWorker.getRegistrations();
                for (const r of regs) await r.unregister();
            } catch(e) {}

            setStatus('המערכת לא פעילה', '');
            document.getElementById('loc-info').textContent = '';
            document.getElementById('register-panel').style.display = 'block';
            document.getElementById('status-panel').style.display = 'none';
            document.getElementById('deactivateBtn').style.display = 'none';
            btn.disabled = false;
            btn.textContent = 'בטל רישום מהמערכת';
        }
    </script>
</body>
</html>
