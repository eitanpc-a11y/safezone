<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SafeZone - ניטור ודיווח</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --red: #d32f2f; --orange: #f57c00; --green: #388e3c; --dark: #121212; }
        body { font-family: system-ui, sans-serif; background: var(--dark); color: white; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; text-align: center; }
        #standby-screen { display: block; padding-top: 40px; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 25px; display: none; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #333; background: #2a2a2a; color: white; font-size: 1.1rem; box-sizing: border-box; text-align: center; }
        .btn { width: 100%; padding: 22px; margin: 10px 0; border: none; border-radius: 18px; color: white; font-weight: bold; font-size: 1.4rem; cursor: pointer; }
        .btn-red { background: var(--red); } .btn-orange { background: var(--orange); } .btn-green { background: var(--green); }
        .push-btn { background: #444; color: #fff; padding: 12px; border-radius: 10px; border: 1px solid #555; margin-top: 20px; cursor: pointer; width: 100%; }
        #debug-msg { font-size: 0.8rem; color: #666; margin-top: 20px; }
        #manual-map-container { display: none; margin-top: 20px; }
        #map-picker { height: 250px; border-radius: 15px; border: 2px solid #444; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="standby-screen">
            <div style="font-size: 3rem; margin-bottom: 10px;">🛡️</div>
            <h2>SafeZone במצב ניטור</h2>
            <input type="text" id="userName" placeholder="שם מלא">
            <input type="text" id="userCity" placeholder="עיר (למשל: יהוד)">
            <button class="push-btn" id="push-btn" onclick="requestPushPermission()">🔔 הפעל התראות Push</button>
            <p id="debug-msg">יש להוסיף למסך הבית כדי לאפשר התראות</p>
            <button onclick="triggerEmergency()" style="margin-top:20px; background:none; border:none; color:#444; text-decoration:underline;">בדיקה ידנית</button>
        </div>

        <div id="emergency-menu" class="card">
            <div style="background:var(--red); padding:10px; border-radius:10px; margin-bottom:15px; font-weight:bold;">⚠️ אזעקה ביישוב שלך!</div>
            <button class="btn btn-red" onclick="report('זקוק לעזרה')">🆘 זקוק לעזרה</button>
            <button class="btn btn-orange" onclick="report('בדרך למקלט')">🏃 בדרך למקלט</button>
            <button class="btn btn-green" onclick="report('בטוח במקלט')">✅ אני בטוח</button>
            <div id="status-msg" style="margin-top:15px; font-weight:bold;"></div>
        </div>

        <div id="manual-map-container">
            <p style="color:#ffb74d;">שיבוש GPS. סמן מיקום ידני:</p>
            <div id="map-picker"></div>
            <button class="btn btn-green" style="font-size:1rem; padding:15px;" onclick="sendManual()">שלח מיקום 📍</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDLKF30weC2z70WvK3zvDoOqIVWYfoQ9ow",
            authDomain: "safezone-cd4b5.firebaseapp.com",
            projectId: "safezone-cd4b5",
            messagingSenderId: "78949340231",
            appId: "1:78949340231:web:85929f70752f1fc7cf8d62"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const messaging = firebase.messaging();

        let manualMap, manualMarker, currentStatus, selLat = 32.0853, selLng = 34.7818;

        async function requestPushPermission() {
            const debug = document.getElementById('debug-msg');
            try {
                debug.innerText = "מבקש הרשאה...";
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    const reg = await navigator.serviceWorker.register('firebase-messaging-sw.js');
                    debug.innerText = "מתחבר לשרת ההתראות...";
                    
                    const token = await messaging.getToken({ 
                        vapidKey: 'BIXCZU-c8gIaA5JScoc7-wDLWKZErE9YM1-NKt0ot0UZq6c6iGKWQgxBHaFzquGlyjL6pMwpV-vH0NOq6XmxZGo', 
                        serviceWorkerRegistration: reg 
                    });

                    if (token) {
                        await db.collection("tokens").doc(token).set({
                            city: document.getElementById('userCity').value,
                            name: document.getElementById('userName').value,
                            updated: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        alert("התראות הופעלו בהצלחה!");
                        document.getElementById('push-btn').innerText = "✅ התראות פעילות";
                    }
                }
            } catch (e) {
                alert("שגיאה: " + e.message);
                debug.innerText = "שגיאה: " + e.message;
            }
        }

        window.onload = () => {
            document.getElementById('userName').value = localStorage.getItem('sz_name') || "";
            document.getElementById('userCity').value = localStorage.getItem('sz_city') || "";
            if (new URLSearchParams(window.location.search).get('alert') === 'true') triggerEmergency();
            setInterval(fetchAlerts, 4000);
        };

        async function fetchAlerts() {
            const city = document.getElementById('userCity').value;
            if (!city) return;
            try {
                const res = await fetch('https://api.cumta.co.il/alertsActive.json');
                const data = await res.json();
                if (data.cities && data.cities.includes(city)) triggerEmergency();
            } catch (e) {}
        }

        function triggerEmergency() {
            document.getElementById('standby-screen').style.display = 'none';
            document.getElementById('emergency-menu').style.display = 'block';
            if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
        }

        async function report(status) {
            currentStatus = status;
            localStorage.setItem('sz_name', document.getElementById('userName').value);
            localStorage.setItem('sz_city', document.getElementById('userCity').value);
            document.getElementById('status-msg').innerText = "מזהה מיקום...";
            navigator.geolocation.getCurrentPosition(async (pos) => {
                if (Math.floor(pos.coords.latitude) === 53 || Math.floor(pos.coords.latitude) === 33) {
                    showManualMap();
                } else {
                    sendToFirebase(pos.coords.latitude, pos.coords.longitude, status);
                }
            }, (err) => { showManualMap(); }, { timeout: 8000 });
        }

        function showManualMap() {
            document.getElementById('manual-map-container').style.display = 'block';
            if (!manualMap) {
                manualMap = L.map('map-picker').setView([32.0853, 34.7818], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(manualMap);
                manualMarker = L.marker([32.0853, 34.7818], {draggable: true}).addTo(manualMap);
                manualMap.on('click', e => { manualMarker.setLatLng(e.latlng); selLat = e.latlng.lat; selLng = e.latlng.lng; });
            }
        }

        function sendManual() { sendToFirebase(selLat, selLng, currentStatus); }

        async function sendToFirebase(lat, lng, status) {
            await db.collection("reports").add({
                name: document.getElementById('userName').value,
                status: status, lat, lng,
                time: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('status-msg').innerHTML = "<span style='color:var(--green)'>✅ נשלח!</span>";
            document.getElementById('manual-map-container').style.display = 'none';
        }
    </script>
</body>
</html>
