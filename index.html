<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SafeZone - הגנה מבוססת GPS</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>

    <style>
        :root {
            --primary-color: #e67e22;
            --danger-color: #e74c3c;
            --success-color: #2ecc71;
            --dark-bg: #1a1a1a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 400px;
            padding: 20px;
            background: #2c3e50;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo { font-size: 3rem; margin-bottom: 10px; }
        h1 { margin: 10px 0; font-size: 1.8rem; }
        p { color: #bdc3c7; line-height: 1.5; }

        .status-card {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 15px;
            margin: 20px 0;
        }

        .btn-gps {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 15px rgba(230, 126, 34, 0.4);
        }

        .btn-gps:active { transform: scale(0.95); }
        .btn-gps:disabled { background: #7f8c8d; cursor: not-allowed; }

        #location-display {
            font-weight: bold;
            color: var(--primary-color);
            margin-top: 10px;
            display: block;
        }

        .loader {
            display: none;
            margin: 10px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">🛡️</div>
        <h1>SafeZone</h1>
        <p>מערכת התראות מצילת חיים לצוותי חירום</p>

        <div class="status-card">
            <div id="status-text">המערכת לא פעילה</div>
            <span id="location-display">ממתין לזיהוי מיקום...</span>
            <div class="loader" id="loader"></div>
        </div>

        <button class="btn-gps" id="btn-activate" onclick="startActivation()">
            הפעל הגנה לפי מיקום GPS
        </button>
        
        <p style="font-size: 0.8rem; margin-top: 20px;">
            * המערכת תזהה את העיר שלך ותשלח התראה רק אם יש בה אזעקה.
        </p>
    </div>

    <script>
        // --- הגדרות FIREBASE מעודכנות ---
        const firebaseConfig = {
            apiKey: "gyKZFrNtLB3we67OY8_iohg6h9TtmRBlpMP1bj1DY_k",
            authDomain: "safezone-cd4b5.firebaseapp.com",
            projectId: "safezone-cd4b5",
            storageBucket: "safezone-cd4b5.appspot.com",
            messagingSenderId: "78949340231",
            appId: "1:78949340231:web:85929f70752f1fc7cf8d62"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const messaging = firebase.messaging();

        async function startActivation() {
            const btn = document.getElementById('btn-activate');
            const loader = document.getElementById('loader');
            const locDisplay = document.getElementById('location-display');
            
            btn.disabled = true;
            loader.style.display = 'block';
            locDisplay.innerText = "מזהה מיקום...";

            try {
                // 1. קבלת מיקום GPS
                const city = await getCityFromGPS();
                locDisplay.innerText = `זוהה: ${city}`;

                // 2. קבלת הרשאת Push וטוקן
                const token = await requestNotificationPermission();
                
                // 3. שמירה ל-Firestore
                await db.collection('tokens').doc(token).set({
                    city: city,
                    lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
                    platform: 'PWA_GPS'
                });

                document.getElementById('status-text').innerText = "✅ המערכת דרוכה ופעילה";
                document.getElementById('status-text').style.color = "#2ecc71";
                alert(`נרשמת בהצלחה! תקבל התראות עבור: ${city}`);

            } catch (error) {
                console.error(error);
                alert("שגיאה: " + error);
                locDisplay.innerText = "זיהוי נכשל";
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }

        function getCityFromGPS() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) return reject("הדפדפן לא תומך ב-GPS");

                navigator.geolocation.getCurrentPosition(async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;

                    try {
                        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=he`);
                        const data = await response.json();
                        
                        let city = data.address.city || data.address.town || data.address.village || data.address.settlement || "לא ידוע";
                        
                        // נירמול שמות לפיקוד העורף
                        if(city.includes("יהוד")) city = "יהוד-מונוסון";
                        if(city.includes("תל אביב")) city = "תל אביב - יפו";
                        
                        resolve(city);
                    } catch (e) { reject("שגיאה בתרגום מיקום לעיר"); }
                }, (err) => reject("חובה לאשר גישה למיקום"), { timeout: 10000 });
            });
        }

        async function requestNotificationPermission() {
            const permission = await Notification.requestPermission();
            if (permission !== 'granted') throw "חובה לאשר התראות";
            
            const registration = await navigator.serviceWorker.register('firebase-messaging-sw.js');
            
            return await messaging.getToken({ 
                serviceWorkerRegistration: registration,
                vapidKey: "BIXCZU-c8gIaA5JScoc7-wDLWKZErE9YM1-NKt0ot0UZq6c6iGKWQgxBHaFzquGlyjL6pMwpV-vH0NOq6XmxZGo" 
            });
        }
    </script>
</body>
</html>
