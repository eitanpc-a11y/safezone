<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SafeZone Admin - מפת שליטה</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }

        /* ===== Login ===== */
        #login-screen {
            position: fixed; inset: 0; background: #1a1a2e;
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        .login-card {
            background: #16213e; border: 1px solid #0f3460;
            border-radius: 16px; padding: 40px 32px;
            width: 100%; max-width: 360px; text-align: center; color: white;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .login-card h2 { font-size: 1.5rem; margin-bottom: 6px; }
        .login-card p { color: #888; font-size: 0.9rem; margin-bottom: 24px; }
        .login-card input {
            width: 100%; padding: 13px; border-radius: 8px;
            border: 2px solid #0f3460; background: #0d1117; color: white;
            font-size: 1rem; margin-bottom: 12px; font-family: inherit;
            text-align: center; letter-spacing: 2px;
        }
        .login-card input:focus { outline: none; border-color: #e74c3c; }
        .login-btn {
            background: #e74c3c; color: white; border: none; padding: 13px;
            width: 100%; border-radius: 8px; font-size: 1rem; font-weight: bold;
            cursor: pointer; font-family: inherit;
        }
        .login-btn:hover { background: #c0392b; }
        .login-error { color: #e74c3c; font-size: 0.85rem; margin-top: 10px; display: none; }

        /* ===== Admin Layout ===== */
        #admin-screen { display: none; height: 100vh; }

        .layout {
            display: flex;
            flex-direction: row-reverse; /* RTL: map on right, panel on left */
            height: 100vh;
        }

        #map { flex: 1; height: 100%; }

        /* ===== Side Panel ===== */
        .side-panel {
            width: 280px;
            min-width: 280px;
            background: #111;
            display: flex;
            flex-direction: column;
            height: 100vh;
            border-right: 1px solid #222;
        }

        .panel-header {
            padding: 14px 14px 10px;
            background: #0d0d0d;
            border-bottom: 1px solid #222;
        }

        .panel-logo { font-size: 0.8rem; color: #555; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .logout-link { color: #444; font-size: 0.72rem; cursor: pointer; }
        .logout-link:hover { color: #888; }

        /* Stat counters */
        .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 10px; }
        .stat-box {
            border-radius: 10px; padding: 10px 6px; text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .stat-box.help  { background: #3d0000; border-color: #7a0000; }
        .stat-box.onway { background: #3d2a00; border-color: #7a5500; }
        .stat-box.safe  { background: #003d1a; border-color: #006633; }

        .stat-box .stat-icon { font-size: 0.85rem; }
        .stat-box .stat-num  { font-size: 1.6rem; font-weight: bold; color: white; line-height: 1.1; }
        .stat-box .stat-lbl  { font-size: 0.68rem; color: rgba(255,255,255,0.5); margin-top: 2px; }
        .stat-box.help  .stat-num { color: #ff6b6b; }
        .stat-box.onway .stat-num { color: #ffc04d; }
        .stat-box.safe  .stat-num { color: #5edb8a; }

        /* Fit map button */
        .btn-fit-map {
            background: rgba(52,152,219,0.15); color: #3498db;
            border: 1px solid rgba(52,152,219,0.3);
            width: 100%; padding: 9px; border-radius: 8px;
            font-size: 0.82rem; font-weight: bold; cursor: pointer;
            font-family: inherit; margin-bottom: 6px;
        }
        .btn-fit-map:hover { background: rgba(52,152,219,0.25); }

        /* Clear button */
        .btn-clear-all {
            background: #c0392b; color: white; border: none;
            width: 100%; padding: 10px; border-radius: 8px;
            font-size: 0.88rem; font-weight: bold; cursor: pointer;
            font-family: inherit; transition: background 0.2s;
        }
        .btn-clear-all:hover { background: #a93226; }

        /* Person list */
        .persons-list {
            flex: 1; overflow-y: auto; padding: 6px 10px;
        }
        .persons-list::-webkit-scrollbar { width: 4px; }
        .persons-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        .empty-state {
            color: #444; font-size: 0.85rem; text-align: center;
            padding: 40px 20px; line-height: 1.7;
        }

        /* Person card */
        .person-card {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 12px 12px 10px;
            margin-bottom: 8px;
            border: 1px solid #2a2a2a;
            transition: border-color 0.2s;
        }
        .person-card.status-help  { border-right: 3px solid #e74c3c; }
        .person-card.status-onway { border-right: 3px solid #f39c12; }
        .person-card.status-safe  { border-right: 3px solid #2ecc71; }
        .person-card.status-none  { border-right: 3px solid #3498db; }

        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
        .person-name { font-weight: bold; color: white; font-size: 0.95rem; }
        .person-time { color: #555; font-size: 0.75rem; flex-shrink: 0; margin-right: 6px; }

        .person-status-text {
            font-size: 0.8rem; margin-bottom: 10px; color: #aaa;
        }
        .person-status-text.help  { color: #ff6b6b; }
        .person-status-text.onway { color: #ffc04d; }
        .person-status-text.safe  { color: #5edb8a; }

        .card-actions { display: flex; gap: 6px; }
        .btn-waze {
            flex: 1; background: #1da1f2; color: white; border: none;
            padding: 8px; border-radius: 7px; font-size: 0.8rem;
            font-weight: bold; cursor: pointer; font-family: inherit;
        }
        .btn-waze:hover { background: #0d8fd9; }
        .btn-done {
            flex: 1; background: #2a2a2a; color: #aaa; border: none;
            padding: 8px; border-radius: 7px; font-size: 0.8rem;
            cursor: pointer; font-family: inherit; border: 1px solid #333;
        }
        .btn-done:hover { background: #333; color: white; }

        /* Test alert button */
        .panel-footer {
            padding: 10px 14px;
            border-top: 1px solid #1a1a1a;
        }
        .btn-test {
            background: #7b0000; color: white; border: none;
            width: 100%; padding: 9px; border-radius: 8px;
            font-size: 0.82rem; font-weight: bold; cursor: pointer;
            font-family: inherit;
        }
        .btn-test:hover { background: #a00; }
        .btn-test:disabled { background: #333; color: #666; cursor: not-allowed; }

        /* Map markers */
        .help-pulse {
            width: 18px; height: 18px; border-radius: 50%;
            background: #e74c3c; border: 2px solid white;
            box-shadow: 0 0 0 0 rgba(231,76,60,0.6);
            animation: helpPulse 1.2s infinite;
        }
        @keyframes helpPulse {
            0%   { box-shadow: 0 0 0 0 rgba(231,76,60,0.7); }
            70%  { box-shadow: 0 0 0 10px rgba(231,76,60,0); }
            100% { box-shadow: 0 0 0 0 rgba(231,76,60,0); }
        }
    </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
    <div class="login-card">
        <h2>🛡️ SafeZone Admin</h2>
        <p>כניסה לפאנל בקרה — מנהלים בלבד</p>
        <input type="password" id="adminPass" placeholder="סיסמת אדמין"
               onkeydown="if(event.key==='Enter') checkPassword()">
        <button class="login-btn" onclick="checkPassword()">כניסה</button>
        <div class="login-error" id="loginError">❌ סיסמה שגויה</div>
    </div>
</div>

<!-- Admin -->
<div id="admin-screen">
    <div class="layout">
        <!-- Map -->
        <div id="map"></div>

        <!-- Side Panel -->
        <div class="side-panel">
            <div class="panel-header">
                <div class="panel-logo">
                    <span>🛡️ SafeZone Control</span>
                    <span class="logout-link" onclick="logout()">יציאה</span>
                </div>

                <div class="stats-row">
                    <div class="stat-box safe">
                        <div class="stat-icon">✅</div>
                        <div class="stat-num" id="safeCount">0</div>
                        <div class="stat-lbl">בטוח</div>
                    </div>
                    <div class="stat-box onway">
                        <div class="stat-icon">🚗</div>
                        <div class="stat-num" id="onwayCount">0</div>
                        <div class="stat-lbl">בדרך</div>
                    </div>
                    <div class="stat-box help">
                        <div class="stat-icon">🆘</div>
                        <div class="stat-num" id="helpCount">0</div>
                        <div class="stat-lbl">סיוע</div>
                    </div>
                </div>

                <button class="btn-fit-map" onclick="fitMapToMarkers()">
                    🗺️ מרכז מפה על כולם
                </button>
                <button class="btn-clear-all" onclick="clearAllReports()">
                    🗑️ ניקוי כל הדיווחים מהמפה
                </button>
            </div>

            <div class="persons-list" id="personsList">
                <div class="empty-state">אין דיווחים כרגע<br>ממתין לנתונים...</div>
            </div>

            <div class="panel-footer">
                <button class="btn-test" id="testBtn" onclick="sendTestAlert()">🚨 ניסוי צופר</button>
            </div>
        </div>
    </div>
</div>

<script>
    const ADMIN_PASSWORD = "SafeZone2024!";
    const ADMIN_SECRET_KEY = "safezone-admin-2024";
    const SAFE_TIMEOUT_MS = 20 * 60 * 1000;

    const firebaseConfig = {
        apiKey: "AIzaSyDLKF30weC2z70WvK3zvDoOqIVWYfoQ9ow",
        authDomain: "safezone-cd4b5.firebaseapp.com",
        projectId: "safezone-cd4b5",
        storageBucket: "safezone-cd4b5.appspot.com",
        messagingSenderId: "78949340231",
        appId: "1:78949340231:web:85929f70752f1fc7cf8d62"
    };

    let db, map;
    let allDocs = {}; // docId -> data
    let markers = {}; // docId -> leaflet marker
    let safeTimers = {};

    function checkPassword() {
        const pass = document.getElementById('adminPass').value;
        if (pass === ADMIN_PASSWORD) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-screen').style.display = 'block';
            initAdmin();
        } else {
            document.getElementById('loginError').style.display = 'block';
            document.getElementById('adminPass').value = '';
            document.getElementById('adminPass').focus();
        }
    }

    function logout() {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('admin-screen').style.display = 'none';
        document.getElementById('adminPass').value = '';
    }

    function formatElapsed(ts) {
        if (!ts) return '';
        const ms = ts.toMillis ? ts.toMillis() : Date.now();
        const mins = Math.floor((Date.now() - ms) / 60000);
        if (mins < 1) return '0 ד\'';
        if (mins < 60) return `${mins} ד'`;
        return `${Math.floor(mins / 60)} ש'`;
    }

    function statusLabel(status) {
        const map = { safe: 'בטוח במקלט', onway: 'בדרך', help: 'זקוק לעזרה', none: 'לא דווח' };
        return map[status] || 'לא דווח';
    }

    function shouldHide(data) {
        if (data.status !== 'safe') return false;
        if (!data.statusTime) return false;
        const ms = data.statusTime.toMillis ? data.statusTime.toMillis() : 0;
        return (Date.now() - ms) > SAFE_TIMEOUT_MS;
    }

    function createMarkerIcon(status) {
        const colors = { help: null, onway: '#f39c12', safe: '#2ecc71', none: '#3498db' };
        if (status === 'help') {
            return L.divIcon({ html: '<div class="help-pulse"></div>', className: '', iconSize: [18,18], iconAnchor: [9,9] });
        }
        const color = colors[status] || colors.none;
        return L.divIcon({
            html: `<div style="background:${color};width:15px;height:15px;border-radius:50%;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.5);"></div>`,
            className: '', iconSize: [15,15], iconAnchor: [7,7]
        });
    }

    function buildPersonsList() {
        const container = document.getElementById('personsList');
        const visible = Object.entries(allDocs).filter(([id, data]) => !shouldHide(data));

        if (visible.length === 0) {
            container.innerHTML = '<div class="empty-state">אין דיווחים כרגע<br>ממתין לנתונים...</div>';
            updateCounts();
            return;
        }

        // Sort: help first, then onway, then safe, then none
        const order = { help: 0, onway: 1, safe: 2, none: 3 };
        visible.sort(([,a],[,b]) => (order[a.status||'none']||3) - (order[b.status||'none']||3));

        container.innerHTML = visible.map(([id, data]) => {
            const status = data.status || 'none';
            const elapsed = formatElapsed(data.statusTime);
            const wazeUrl = data.lat && data.lng
                ? `https://waze.com/ul?ll=${data.lat},${data.lng}&navigate=yes`
                : '#';

            return `
                <div class="person-card status-${status}" id="card-${id}">
                    <div class="card-top">
                        <div class="person-name">${data.name || 'אנונימי'}</div>
                        <div class="person-time">${elapsed}</div>
                    </div>
                    <div class="person-status-text ${status}">${statusLabel(status)}</div>
                    <div class="card-actions">
                        <button class="btn-waze" onclick="openWaze('${data.lat}','${data.lng}')">Waze</button>
                        <button class="btn-done" onclick="markDone('${id}')">סיים טיפול</button>
                    </div>
                </div>
            `;
        }).join('');

        updateCounts();
    }

    function updateCounts() {
        let safe = 0, onway = 0, help = 0;
        Object.values(allDocs).forEach(data => {
            if (shouldHide(data)) return;
            if (data.status === 'safe')  safe++;
            if (data.status === 'onway') onway++;
            if (data.status === 'help')  help++;
        });
        document.getElementById('safeCount').textContent  = safe;
        document.getElementById('onwayCount').textContent = onway;
        document.getElementById('helpCount').textContent  = help;
    }

    function updateMarker(id, data) {
        if (shouldHide(data)) {
            if (markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
            return;
        }
        if (!data.lat || !data.lng) return;

        const status = data.status || 'none';
        const icon = createMarkerIcon(status);
        const popup = `<b>${data.name||'אנונימי'}</b><br>${data.city||''}<br>${statusLabel(status)}`;

        if (markers[id]) {
            markers[id].setIcon(icon);
            markers[id].getPopup().setContent(popup);
        } else {
            markers[id] = L.marker([data.lat, data.lng], { icon }).addTo(map).bindPopup(popup);
        }
    }

    function scheduleRemoval(id, data) {
        if (data.status !== 'safe' || !data.statusTime) return;
        const ms = data.statusTime.toMillis ? data.statusTime.toMillis() : Date.now();
        const remaining = SAFE_TIMEOUT_MS - (Date.now() - ms);
        if (remaining <= 0) { removeEntry(id); return; }
        if (safeTimers[id]) clearTimeout(safeTimers[id]);
        safeTimers[id] = setTimeout(() => removeEntry(id), remaining);
    }

    function removeEntry(id) {
        if (markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
        if (safeTimers[id]) { clearTimeout(safeTimers[id]); delete safeTimers[id]; }
        if (allDocs[id]) {
            allDocs[id] = { ...allDocs[id], status: null, statusTime: null };
        }
        buildPersonsList();
    }

    function fitMapToMarkers() {
        const latlngs = Object.values(markers).map(m => m.getLatLng());
        if (latlngs.length === 0) { alert("אין מיקומים להצגה במפה"); return; }
        if (latlngs.length === 1) { map.setView(latlngs[0], 14); return; }
        const group = L.featureGroup(Object.values(markers));
        map.fitBounds(group.getBounds().pad(0.3));
    }

    function openWaze(lat, lng) {
        if (!lat || !lng) return;
        window.open(`https://waze.com/ul?ll=${lat},${lng}&navigate=yes`, '_blank');
    }

    async function markDone(id) {
        try {
            await db.collection('tokens').doc(id).update({ status: null, statusTime: null });
            if (allDocs[id]) allDocs[id] = { ...allDocs[id], status: null, statusTime: null };
            buildPersonsList();
            updateMarker(id, allDocs[id] || {});
        } catch(e) { alert("שגיאה: " + e.message); }
    }

    async function clearAllReports() {
        if (!confirm("למחוק את כל הדיווחים מהמפה?")) return;
        const batch = db.batch();
        Object.keys(allDocs).forEach(id => {
            batch.update(db.collection('tokens').doc(id), { status: null, statusTime: null });
        });
        await batch.commit();
    }

    async function sendTestAlert() {
        if (!confirm("לשלוח הודעת ניסוי לכל הצוות?")) return;
        const btn = document.getElementById('testBtn');
        btn.disabled = true; btn.textContent = 'שולח...';
        try {
            const res = await fetch(`https://us-central1-safezone-cd4b5.cloudfunctions.net/sendManualAlert?key=${ADMIN_SECRET_KEY}`);
            alert("✅ " + await res.text());
        } catch(e) { alert("❌ שגיאה: " + e.message); }
        finally { btn.disabled = false; btn.textContent = '🚨 ניסוי צופר'; }
    }

    function initAdmin() {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();

        map = L.map('map').setView([31.8, 34.9], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Update time labels every minute
        setInterval(() => { if (Object.keys(allDocs).length) buildPersonsList(); }, 60000);

        let firstLoad = true;

        db.collection('tokens').onSnapshot(snapshot => {
            snapshot.docChanges().forEach(change => {
                const id = change.doc.id;
                const data = change.doc.data();

                if (change.type === 'removed') {
                    delete allDocs[id];
                    if (markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
                    if (safeTimers[id]) { clearTimeout(safeTimers[id]); delete safeTimers[id]; }
                    return;
                }

                allDocs[id] = data;
                updateMarker(id, data);

                if (data.status === 'safe') scheduleRemoval(id, data);
                else if (safeTimers[id]) { clearTimeout(safeTimers[id]); delete safeTimers[id]; }
            });

            buildPersonsList();

            // מרכז מפה אוטומטית בטעינה ראשונה
            if (firstLoad && Object.keys(markers).length > 0) {
                firstLoad = false;
                setTimeout(fitMapToMarkers, 300);
            }
        });
    }
</script>
</body>
</html>
