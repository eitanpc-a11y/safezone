<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חמ"ל SafeZone - ניהול מבצעי</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: system-ui, sans-serif; background: #121212; color: white; }
        #sidebar { width: 380px; background: #1e1e1e; display: flex; flex-direction: column; border-left: 1px solid #333; }
        #map { flex-grow: 1; height: 100%; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 15px; background: #252525; }
        .stat-box { padding: 10px; border-radius: 8px; text-align: center; font-size: 0.8rem; font-weight: bold; }
        .bg-red { background: rgba(211, 47, 47, 0.2); border: 1px solid #d32f2f; color: #ff8a80; }
        .bg-orange { background: rgba(245, 124, 0, 0.2); border: 1px solid #f57c00; color: #ffb74d; }
        .bg-green { background: rgba(56, 142, 60, 0.2); border: 1px solid #388e3c; color: #81c784; }

        .report-item { background: #2d2d2d; padding: 12px; margin: 10px; border-radius: 12px; border-right: 5px solid #555; border-bottom: 1px solid #444; }
        /* התאמת צבעים מדויקת לכפתורים */
        .status-red { border-right-color: #d32f2f; }
        .status-orange { border-right-color: #f57c00; }
        .status-green { border-right-color: #388e3c; }

        .btn-row { display: flex; gap: 5px; margin-top: 10px; }
        .action-btn { flex: 1; padding: 8px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; font-size: 0.75rem; }
        .waze { background: #33ccff; color: #000; }
        .clear-btn { background: #ff5252; color: white; margin: 10px; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        
        #reports-list { overflow-y: auto; flex-grow: 1; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="stats-grid">
            <div class="stat-box bg-red">🆘 סיוע<br><span id="s-red">0</span></div>
            <div class="stat-box bg-orange">🏃 בדרך<br><span id="s-orange">0</span></div>
            <div class="stat-box bg-green">✅ בטוח<br><span id="s-green">0</span></div>
        </div>
        <button class="clear-btn" id="main-clear-btn">🗑️ ניקוי כל הדיווחים מהמפה</button>
        <div id="reports-list"></div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, deleteDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLKF30weC2z70WvK3zvDoOqIVWYfoQ9ow",
            authDomain: "safezone-cd4b5.firebaseapp.com",
            projectId: "safezone-cd4b5",
            appId: "1:78949340231:web:85929f70752f1fc7cf8d62"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const map = L.map('map').setView([32.0853, 34.7818], 9);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // פונקציית ניקוי מתוקנת
        document.getElementById('main-clear-btn').onclick = async () => {
            if (confirm("האם אתה בטוח שברצונך למחוק את כל הדיווחים?")) {
                const snapshot = await getDocs(collection(db, "reports"));
                const deletePromises = snapshot.docs.map(d => deleteDoc(doc(db, "reports", d.id)));
                await Promise.all(deletePromises);
                alert("המפה נוקתה!");
            }
        };

        onSnapshot(query(collection(db, "reports"), orderBy("time", "desc")), (snapshot) => {
            const listDiv = document.getElementById('reports-list');
            listDiv.innerHTML = "";
            let r=0, o=0, g=0;
            const now = Date.now();
            
            map.eachLayer(l => { if (l instanceof L.CircleMarker) map.removeLayer(l); });

            snapshot.forEach((docSnap) => {
                const d = docSnap.data();
                const reportTime = d.time ? d.time.toDate().getTime() : now;
                const diffMin = Math.floor((now - reportTime) / 60000);

                // ניקוי אוטומטי של ירוקים אחרי 20 דקות
                if (d.status === 'בטוח במקלט' && diffMin > 20) return;

                // קביעת צבע לפי הסטטוס המדויק
                let color = '#555';
                let statusClass = '';
                if (d.status === 'זקוק לעזרה') { color = '#d32f2f'; statusClass = 'status-red'; r++; }
                else if (d.status === 'בדרך למרחב מוגן') { color = '#f57c00'; statusClass = 'status-orange'; o++; }
                else if (d.status === 'בטוח במקלט') { color = '#388e3c'; statusClass = 'status-green'; g++; }

                // הוספה למפה
                const marker = L.circleMarker([d.lat, d.lng], { color, radius: 12, fillOpacity: 0.9 }).addTo(map)
                 .bindPopup(`<b>${d.name}</b><br>${d.status}<br><a href="https://www.waze.com/ul?ll=${d.lat},${d.lng}&navigate=yes" target="_blank">נווט ב-Waze</a>`);

                // פתרון לדיווחים מחוץ לישראל: אם זה דיווח אדום חדש, המפה תקפוץ אליו
                if (d.status === 'זקוק לעזרה' && diffMin < 1) {
                    map.setView([d.lat, d.lng], 13);
                }

                // הוספה לרשימה בצד
                const item = document.createElement('div');
                item.className = `report-item ${statusClass}`;
                item.innerHTML = `
                    <div style="display:flex; justify-content:space-between">
                        <strong>${d.name}</strong>
                        <small>${diffMin} דק'</small>
                    </div>
                    <div style="margin:5px 0; font-size:0.9rem;">${d.status}</div>
                    <div class="btn-row">
                        <button class="action-btn waze" onclick="window.open('https://www.waze.com/ul?ll=${d.lat},${d.lng}&navigate=yes')">Waze</button>
                        <button class="action-btn" style="background:#444; color:white" onclick="deleteSingle('${docSnap.id}')">סיים טיפול</button>
                    </div>
                `;
                listDiv.appendChild(item);
            });
            
            document.getElementById('s-red').innerText = r;
            document.getElementById('s-orange').innerText = o;
            document.getElementById('s-green').innerText = g;
        });

        window.deleteSingle = async (id) => { await deleteDoc(doc(db, "reports", id)); };
    </script>
</body>
</html>
