<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חמ"ל SafeZone - ניהול מבצעי</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: system-ui, sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; display: none; }
        #login { height: 100vh; display: flex; align-items: center; justify-content: center; background: #1a1a1a; color: white; }
        .login-box { text-align: center; background: #333; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { margin-bottom: 20px; color: #ff5252; }
        input { padding: 15px; margin-bottom: 20px; border-radius: 10px; border: none; font-size: 1.2rem; text-align: center; width: 200px; }
        button { padding: 15px 40px; background: #d32f2f; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
        button:hover { background: #ff5252; }
    </style>
</head>
<body>

    <div id="login">
        <div class="login-box">
            <h2>חמ"ל SafeZone</h2>
            <p>הזן קוד גישה לכניסה למפה</p>
            <input type="password" id="pass" placeholder="קוד גישה (1234)">
            <br>
            <button onclick="checkPass()">כניסה למערכת</button>
        </div>
    </div>

    <div id="map"></div>

    <audio id="alert-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLKF30weC2z70WvK3zvDoOqIVWYfoQ9ow",
            authDomain: "safezone-cd4b5.firebaseapp.com",
            projectId: "safezone-cd4b5",
            appId: "1:78949340231:web:85929f70752f1fc7cf8d62"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const audio = document.getElementById('alert-sound');

        window.checkPass = () => {
            const p = document.getElementById('pass').value;
            if(p === "1234") {
                // "דריכת" הצליל כדי לעקוף חסימת דפדפן
                audio.play().then(() => {
                    audio.pause();
                    audio.currentTime = 0;
                }).catch(e => console.log("Audio prep needed interaction"));

                document.getElementById('login').style.display = 'none';
                document.getElementById('map').style.display = 'block';
                loadMap();
            } else {
                alert("קוד שגוי");
            }
        };

        function loadMap() {
            const map = L.map('map').setView([32.0853, 34.7818], 9);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            // האזנה לדיווחים חדשים
            onSnapshot(collection(db, "reports"), (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added") {
                        const d = change.doc.data();
                        
                        // אם זה דיווח "זקוק לעזרה", השמע צליל
                        if (d.status === 'זקוק לעזרה') {
                            audio.play().catch(err => console.log("Sound error:", err));
                        }

                        let color = 'orange';
                        if (d.status === 'זקוק לעזרה') color = 'red';
                        if (d.status === 'בטוח במקלט') color = 'green';
                        
                        L.circleMarker([d.lat, d.lng], { 
                            color: color, 
                            radius: 12, 
                            fillOpacity: 0.9,
                            weight: 3
                        }).addTo(map)
                         .bindPopup(`<b>${d.name}</b><br>מצב: ${d.status}<br>טלפון: ${d.phone}<br>זמן: ${d.time?.toDate().toLocaleTimeString('he-IL')}`);
                    }
                });
            });
        }
    </script>
</body>
</html>
