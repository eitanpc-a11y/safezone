<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חמ"ל SafeZone - מרכז שליטה</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: system-ui; background: #121212; color: white; }
        #sidebar { width: 380px; background: #1e1e1e; display: flex; flex-direction: column; border-left: 1px solid #333; }
        #map { flex-grow: 1; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 15px; background: #252525; }
        .stat-box { padding: 10px; border-radius: 8px; text-align: center; font-size: 0.9rem; font-weight: bold; }
        .bg-red { background: rgba(211, 47, 47, 0.2); border: 1px solid #d32f2f; color: #ff8a80; }
        .bg-orange { background: rgba(245, 124, 0, 0.2); border: 1px solid #f57c00; color: #ffb74d; }
        .bg-green { background: rgba(56, 142, 60, 0.2); border: 1px solid #388e3c; color: #81c784; }

        .report-item { background: #2d2d2d; padding: 12px; margin: 10px; border-radius: 12px; border-right: 5px solid #555; }
        .status-red { border-right-color: #d32f2f; }
        .status-orange { border-right-color: #f57c00; }
        .status-green { border-right-color: #388e3c; }

        .btn-actions { display: flex; gap: 8px; margin-top: 10px; }
        .btn-sm { flex: 1; padding: 10px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        .waze { background: #33ccff; color: black; }
        .sms { background: #ffeb3b; color: black; }
        
        #reports-list { overflow-y: auto; flex-grow: 1; padding-bottom: 20px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="stats-grid">
            <div class="stat-box bg-red">🆘 סיוע: <span id="s-red">0</span></div>
            <div class="stat-box bg-orange">🏃 בדרך: <span id="s-orange">0</span></div>
            <div class="stat-box bg-green">✅ בטוח: <span id="s-green">0</span></div>
        </div>
        <div style="padding: 10px; text-align: center;">
            <button onclick="exportToCSV()" style="background:#444; color:white; border:none; padding:5px 15px; border-radius:4px; cursor:pointer">📊 ייצוא</button>
            <button onclick="clearAll()" style="background:#444; color:#ff5252; border:none; padding:5px 15px; border-radius:4px; cursor:pointer">🗑️ נקה הכל</button>
        </div>
        <div id="reports-list"></div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, deleteDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLKF30weC2z70WvK3zvDoOqIVWYfoQ9ow",
            authDomain: "safezone-cd4b5.firebaseapp.com",
            projectId: "safezone-cd4b5",
            appId: "1:78949340231:web:85929f70752f1fc7cf8d62"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const map = L.map('map').setView([32.0853, 34.7818], 9);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        onSnapshot(query(collection(db, "reports"), orderBy("time", "desc")), (snapshot) => {
            document.getElementById('reports-list').innerHTML = "";
            let rCount = 0, oCount = 0, gCount = 0;
            const now = Date.now();
            map.eachLayer(l => { if (l instanceof L.CircleMarker) map.removeLayer(l); });

            snapshot.forEach((docSnap) => {
                const d = docSnap.data();
                const reportTime = d.time ? d.time.toDate().getTime() : now;
                const diffMin = (now - reportTime) / 60000;

                // ירוקים נמחקים מהתצוגה אחרי 20 דקות
                if (d.status === 'בטוח במקלט' && diffMin > 20) return;

                if (d.status === 'זקוק לעזרה') { rCount++; }
                else if (d.status === 'בדרך למרחב מוגן') { oCount++; }
                else { gCount++; }

                const color = d.status === 'זקוק לעזרה' ? '#d32f2f' : (d.status === 'בדרך למרחב מוגן' ? '#f57c00' : '#388e3c');
                
                L.circleMarker([d.lat, d.lng], { color, radius: 12, fillOpacity: 0.9 }).addTo(map)
                 .bindPopup(`<b>${d.name}</b><br>${d.status}<br><a href="https://www.waze.com/ul?ll=${d.lat},${d.lng}&navigate=yes" target="_blank">נווט ב-Waze</a>`);

                const item = document.createElement('div');
                item.className = `report-item status-${d.status === 'זקוק לעזרה' ? 'red' : (d.status === 'בדרך למרחב מוגן' ? 'orange' : 'green')}`;
                item.innerHTML = `
                    <div style="display:flex; justify-content:space-between">
                        <strong>${d.name}</strong>
                        <small>${Math.floor(diffMin)} דק'</small>
                    </div>
                    <div style="margin: 5px 0;">${d.status}</div>
                    <div class="btn-actions">
                        <button class="btn-sm waze" onclick="window.open('https://www.waze.com/ul?ll=${d.lat},${d.lng}&navigate=yes')">Waze</button>
                        ${d.status === 'בדרך למרחב מוגן' ? `<button class="btn-sm sms" onclick="location.href='sms:${d.phone}?body=היי ${d.name}, ראיתי שאתה בדרך, הגעת למרחב מוגן?'">SMS תזכורת</button>` : ''}
                        <button class="btn-sm" style="background:#555; color:white;" onclick="deleteReport('${docSnap.id}')">V</button>
                    </div>
                `;
                document.getElementById('reports-list').appendChild(item);
            });
            document.getElementById('s-red').innerText = rCount;
            document.getElementById('s-orange').innerText = oCount;
            document.getElementById('s-green').innerText = gCount;
        });

        window.deleteReport = async (id) => { await deleteDoc(doc(db, "reports", id)); };
        window.clearAll = async () => { if(confirm("למחוק הכל?")) { (await getDocs(collection(db, "reports"))).forEach(d => deleteReport(d.id)); } };
    </script>
</body>
</html>
